services:
  redis:
    image: docker.io/library/redis:7
    restart: unless-stopped
    volumes:
      - ./redisdata:/data

  db:
    image: docker.io/tensorchord/pgvecto-rs:pg16-v0.2.0
    restart: unless-stopped
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: immich
      POSTGRES_USER: immich
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--data-checksums"

  machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:release
    restart: unless-stopped
    volumes:
      - ./model-cache:/cache

  server:
    image: ghcr.io/immich-app/immich-server:release
    restart: unless-stopped
    depends_on:
      - db
      - redis
      - machine-learning
    volumes:
      - ${UPLOAD_LOCATION}:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
    environment:
      DB_HOSTNAME: db
      DB_DATABASE_NAME: immich
      DB_USERNAME: immich
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOSTNAME: redis
      IMMICH_MACHINE_LEARNING_URL: http://machine-learning:3003
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.immich.rule=Host(`pics.${DOMAIN}`)"
      - "traefik.http.routers.immich.entrypoints=websecure"
      - "traefik.http.routers.immich.tls.certresolver=le"
      - "traefik.http.services.immich.loadbalancer.server.port=2283"
      - "traefik.docker.network=traefik"
    networks:
      - traefik
      - default

networks:
  traefik:
    external: true
